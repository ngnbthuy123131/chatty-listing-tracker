  .header { background: #1A0A7A; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  .header .logo { background: #FFD200; color: #1A0A7A; font-weight: 800; font-size: 13px; padding: 5px 10px; border-radius: 6px; }

  .tabs { display: flex; background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 24px; }
  .tab { padding: 12px 20px; font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; color: #666; }
  .tab.active { border-bottom-color: #1A0A7A; color: #1A0A7A; font-weight: 600; }

  /* Layout */

  .sidebar-label { font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: .5px; padding: 14px 16px 6px; }
  .date-item { padding: 9px 16px; font-size: 12.5px; cursor: pointer; color: #555; border-left: 3px solid transparent; transition: all .15s; display: flex; align-items: center; justify-content: space-between; }
  .date-item:hover { background: #f7f7f7; }
  .date-item.active { background: #f0edff; border-left-color: #1A0A7A; color: #1A0A7A; font-weight: 600; }
  .date-item .badge { background: #e5e5e5; color: #555; font-size: 10px; padding: 1px 6px; border-radius: 10px; }
  .date-item.active .badge { background: #1A0A7A; color: #fff; }
  .date-item.proposed { color: #7c3aed; }
  .date-item.proposed.active { background: #f5f3ff; border-left-color: #7c3aed; }
  .date-item.proposed .badge { background: #ede9fe; color: #7c3aed; }
  .date-item.proposed.active .badge { background: #7c3aed; color: #fff; }

  /* Main content */
  .main { flex: 1; overflow-y: auto; padding: 24px; }
  .view { display: none; }
  .view.active { display: block; }

  /* Date header */
  .date-header { margin-bottom: 20px; }
  .date-header h2 { font-size: 18px; font-weight: 700; color: #1A0A7A; }
  .date-header p { font-size: 12px; color: #888; margin-top: 3px; }

  .change-card .field-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #888; margin-bottom: 8px; }
  .change-card .content { font-size: 13.5px; color: #1a1a2e; line-height: 1.6; }
  .change-card .meta { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .char-bar-wrap { flex: 1; background: #f0f0f0; border-radius: 4px; height: 5px; overflow: hidden; }
  .char-bar { height: 100%; border-radius: 4px; transition: width .3s; }
  .char-bar.ok { background: #22c55e; }
  .char-bar.warn { background: #f59e0b; }
  .char-bar.over { background: #ef4444; }
  .char-label { font-size: 11px; font-weight: 600; white-space: nowrap; }
  .char-label.ok { color: #22c55e; }
  .char-label.warn { color: #f59e0b; }
  .char-label.over { color: #ef4444; }

  .note-card .field-name { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #d97706; margin-bottom: 4px; }
  .empty-state { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }

  .rank-card { background: #fff; border-radius: 10px; border: 1px solid #e8e8e8; padding: 14px 16px; }
  .rank-card .kw { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #888; margin-bottom: 8px; }
  .rank-card .pos { font-size: 28px; font-weight: 800; line-height: 1; }
  .rank-card .pos.p1 { color: #16a34a; }
  .rank-card .pos.p2 { color: #2563eb; }
  .rank-card .pos.p5 { color: #d97706; }
  .rank-card .pos.p10 { color: #dc2626; }
  .rank-card .pos.pnone { color: #ccc; font-size: 18px; }
  .rank-card .sub { font-size: 11px; color: #aaa; margin-top: 4px; }
  .rank-section-title { font-size: 13px; font-weight: 700; color: #1A0A7A; margin-bottom: 12px; margin-top: 4px; }
  .rank-updated { font-size: 11px; color: #aaa; margin-bottom: 16px; }
  .rank-history-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #e8e8e8; font-size: 12.5px; }
  .rank-history-table th { background: #f7f7f9; padding: 8px 12px; text-align: left; font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; border-bottom: 1px solid #e8e8e8; }
  .rank-history-table td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; }

  .rank-pill.p1 { background: #dcfce7; color: #16a34a; }
  .rank-pill.p2 { background: #dbeafe; color: #2563eb; }
  .rank-pill.p5 { background: #fef3c7; color: #d97706; }
  .rank-pill.p10 { background: #fee2e2; color: #dc2626; }
  .rank-pill.pnone { background: #f0f0f0; color: #aaa; }

  .report-row .before { color: #aaa; font-weight: 400; }
  .delta { font-size: 11px; font-weight: 700; padding: 1px 6px; border-radius: 4px; }
  .delta.up { background: #dcfce7; color: #16a34a; }
  .delta.down { background: #fee2e2; color: #dc2626; }
  .delta.flat { background: #f0f0f0; color: #888; }
  .pending-badge { display: inline-flex; align-items: center; gap: 4px; background: #fef3c7; color: #92400e; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
  .report-changes-list { padding: 12px 20px; background: #f9f9fb; border-top: 1px solid #f0f0f0; }
  .report-changes-list .change-item { font-size: 12px; color: #555; padding: 3px 0; }

  .comp-field { margin-bottom: 10px; }

  .comp-last-check { font-size: 10px; color: #bbb; margin-top: 8px; }

  .comp-changes-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #e8e8e8; font-size: 12.5px; margin-bottom: 28px; }
  .comp-changes-table th { background: #f7f7f9; padding: 8px 14px; text-align: left; font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; border-bottom: 1px solid #e8e8e8; }

  .comp-compare-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #e8e8e8; font-size: 12px; margin-bottom: 24px; }
  .comp-compare-table th { background: #1A0A7A; color: #fff; padding: 9px 14px; text-align: left; font-size: 11px; font-weight: 700; border-right: 1px solid #2d1a99; white-space: nowrap; }

// Build current state from latest non-null value per field
function buildCurrentState() {
  const state = {};
  history.filter(h => !h.proposed).forEach(entry => {
    entry.changes.forEach(c => {
      if (c.chars !== null) state[c.field] = { content: c.content, chars: c.chars, date: entry.date };
    });
  });
  return state;
}

function charStatus(chars, field) {
  const limit = LIMITS[field];
  if (!limit || chars === null) return 'ok';
  const pct = chars / limit;
  if (pct > 1) return 'over';
  if (pct > 0.85) return 'warn';
  return 'ok';
}

function charBarWidth(chars, field) {
  const limit = LIMITS[field];
  if (!limit || chars === null) return 0;
  return Math.min(100, Math.round(chars / limit * 100));
}

// Render sidebar
function renderSidebar(activeId) {
  const el = document.getElementById('date-list');
  el.innerHTML = history.map(h => `
    <div class="date-item ${h.proposed ? 'proposed' : ''} ${h.id === activeId ? 'active' : ''}"
         onclick="selectDate('${h.id}')">
      ${h.date}
      <span class="badge">${h.changes.length}</span>
    </div>
  `).join('');
}

// Render history detail
function renderHistory(id) {
  const entry = history.find(h => h.id === id);
  const el = document.getElementById('history-content');
  if (!entry) { el.innerHTML = '<div class="empty-state">Select a date to view changes</div>'; return; }

  const changes = entry.changes.filter(c => c.content && !c.content.startsWith('http'));
  const links = entry.changes.filter(c => c.content && c.content.startsWith('http'));

  el.innerHTML = `
    <div class="date-header">
      <h2>${entry.date} ${entry.proposed ? '<span class="proposed-badge">Proposed</span>' : ''}</h2>
      <p>${entry.changes.length} field${entry.changes.length !== 1 ? 's' : ''} changed</p>
    </div>
    ${changes.length === 0 ? '<div class="empty-state">No text changes on this date</div>' : ''}
    ${changes.map(c => {
      const st = charStatus(c.chars, c.field);
      const limit = LIMITS[c.field];
      return `
        <div class="change-card">
          <div class="field-name">${c.field}</div>
          <div class="content">${c.content}</div>
          ${c.chars !== null && limit ? `
          <div class="meta">
            <div class="char-bar-wrap">
              <div class="char-bar ${st}" style="width:${charBarWidth(c.chars, c.field)}%"></div>
            </div>
            <span class="char-label ${st}">${c.chars}/${limit}</span>
          </div>` : ''}
        </div>`;
    }).join('')}
    ${links.map(c => `
      <div class="note-card">
        <div class="field-name">${c.field}</div>
        Feature images updated — <a href="${c.content}" target="_blank" style="color:#1A0A7A">View folder</a>
      </div>`).join('')}
  `;
}

// Render current content
function renderCurrent() {
  const state = buildCurrentState();
  const groups = [
    { label: 'App Store Copy', fields: ['App Name', 'App Card Subtitle', 'Intro', 'App Details'] },
    { label: 'Features', fields: ['Feature 1', 'Feature 2', 'Feature 3', 'Feature 4', 'Feature 5'] },
    { label: 'SEO', fields: ['Title Tag', 'Meta Description'] },
    { label: 'Alt Texts', fields: ['Alt 1', 'Alt 2', 'Alt 3', 'Alt 4', 'Alt 5', 'Alt 6', 'Alt 7'] },
  ];

  const el = document.getElementById('current-content');
  el.innerHTML = groups.map(g => {
    const rows = g.fields.map(f => {
      const s = state[f];
      if (!s) return `<div class="current-row"><div class="field">${f}</div><div class="value" style="color:#bbb">No data</div></div>`;
      const st = charStatus(s.chars, f);
      const limit = LIMITS[f];
      return `
        <div class="current-row">
          <div class="field">${f}</div>
          <div class="value">${s.content}</div>
          ${limit ? `<div class="chars char-label ${st}">${s.chars}/${limit}</div>` : ''}
        </div>`;
    }).join('');
    return `<div class="section-group"><div class="section-group-title">${g.label}</div>${rows}</div>`;
  }).join('');
}

function rankClass(pos) {
  if (!pos) return 'pnone';
  if (pos <= 3) return 'p1';
  if (pos <= 6) return 'p2';
  if (pos <= 10) return 'p5';
  return 'p10';
}

const CHART_COLORS = [
  '#1A0A7A','#FFD200','#ef4444','#22c55e','#f97316','#8b5cf6',
  '#06b6d4','#ec4899','#84cc16','#14b8a6','#f59e0b','#6366f1'
];

let rankChart = null;

async function renderRankings() {
  const el = document.getElementById('rankings-content');
  try {
    const res = await fetch('ranking-log.json');
    const log = await res.json();

    const realEntries = log.filter(e => e.results.some(r => r.organicPosition !== undefined));
    const latest = [...realEntries].reverse()[0];
    if (!latest) { el.innerHTML = '<div class="empty-state">No ranking data yet</div>'; return; }

    const updated = new Date(latest.time).toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });

    // Build per-keyword history across all dates
    const allDates = [...new Set(realEntries.map(e => e.date))].sort();
    const keywords = latest.results.map(r => r.keyword);
    const kwHistory = {};
    keywords.forEach(kw => {
      kwHistory[kw] = allDates.map(d => {
        const entry = realEntries.find(e => e.date === d);
        const r = entry?.results.find(r => r.keyword === kw);
        return r?.organicPosition ?? null;
      });
    });

    // Current cards
    const cards = latest.results.map(r => {
      const pos = r.organicPosition;
      const cls = rankClass(pos);
      return `<div class="rank-card">
        <div class="kw">${r.keyword}</div>
        <div class="pos ${cls}">${pos ? '#' + pos : '—'}</div>
        <div class="sub">${pos ? `#${r.position} overall` : 'Not in top results'}</div>
      </div>`;
    }).join('');

    // Competitor table
    const competitors = latest.results[0]?.competitors ? Object.keys(latest.results[0].competitors) : [];
    const compRows = latest.results.map(r => {
      if (!r.competitors) return '';
      const chattyPill = `<span class="rank-pill ${rankClass(r.organicPosition)}">${r.organicPosition ? '#' + r.organicPosition : '—'}</span>`;
      const compCells = competitors.map(c => {
        const pos = r.competitors[c];
        return `<td style="text-align:center"><span class="rank-pill ${rankClass(pos)}">${pos ? '#' + pos : '—'}</span></td>`;
      }).join('');
      return `<tr><td style="font-weight:600">${r.keyword}</td><td style="text-align:center">${chattyPill}</td>${compCells}</tr>`;
    }).filter(Boolean).join('');

    // History table rows
    const tableRows = keywords.map((kw, ki) => {
      const cells = allDates.map(d => {
        const pos = kwHistory[kw][allDates.indexOf(d)];
        return `<td><span class="rank-pill ${rankClass(pos)}">${pos ? '#' + pos : '—'}</span></td>`;
      }).join('');
      return `<tr><td style="font-weight:600">${kw}</td>${cells}</tr>`;
    }).join('');

    // Keyword toggle buttons for chart
    const toggles = keywords.map((kw, i) =>
      `<span class="kw-toggle" style="color:${CHART_COLORS[i]};border-color:${CHART_COLORS[i]}" onclick="toggleKw(${i},this)" data-idx="${i}">${kw}</span>`
    ).join('');

    el.innerHTML = `
      <div class="rank-section-title">Current Organic Rankings</div>
      <div class="rank-updated">Last checked: ${updated}</div>
      <div class="rank-grid">${cards}</div>

      <div class="rank-section-title" style="margin-top:24px">Ranking Trend (Organic Position)</div>
      <div class="rank-updated">#1 = top of page. Lower number = better. Click keywords to show/hide.</div>
      <div class="chart-wrap">
        <div class="chart-filters">${toggles}</div>
        <canvas id="rankChart" height="100"></canvas>
      </div>

      <div class="rank-section-title" style="margin-top:8px">Chatty vs Competitors (Organic)</div>
      <div class="rank-updated">Green = top 3 &nbsp;|&nbsp; Blue = top 6 &nbsp;|&nbsp; Yellow = top 10 &nbsp;|&nbsp; Red = 11+</div>
      <div style="overflow-x:auto">
      <table class="rank-history-table">
        <thead><tr>
          <th>Keyword</th>
          <th style="text-align:center;color:#1A0A7A">Chatty</th>
          ${competitors.map(c => `<th style="text-align:center">${c}</th>`).join('')}
        </tr></thead>
        <tbody>${compRows}</tbody>
      </table></div>

      <div class="rank-section-title" style="margin-top:24px">Ranking History</div>
      <div style="overflow-x:auto">
      <table class="rank-history-table">
        <thead><tr><th>Keyword</th>${allDates.map(d => `<th>${d}</th>`).join('')}</tr></thead>
        <tbody>${tableRows}</tbody>
      </table></div>`;

    // Build Chart.js datasets
    const datasets = keywords.map((kw, i) => ({
      label: kw,
      data: kwHistory[kw],
      borderColor: CHART_COLORS[i],
      backgroundColor: CHART_COLORS[i] + '22',
      borderWidth: 2.5,
      pointRadius: 5,
      pointHoverRadius: 7,
      tension: 0.3,
      spanGaps: true,
    }));

    if (rankChart) rankChart.destroy();
    rankChart = new Chart(document.getElementById('rankChart'), {
      type: 'line',
      data: { labels: allDates, datasets },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => `${ctx.dataset.label}: #${ctx.parsed.y ?? '—'}`,
            }
          }
        },
        scales: {
          y: {
            reverse: true,
            min: 1,
            title: { display: true, text: 'Organic Rank (lower = better)', font: { size: 11 } },
            ticks: { stepSize: 1, callback: v => '#' + v },
            grid: { color: '#f0f0f0' }
          },
          x: {
            grid: { color: '#f0f0f0' },
            ticks: { font: { size: 11 } }
          }
        }
      }
    });

    // Store for toggle
    window._rankChartRef = rankChart;
  } catch (e) {
    el.innerHTML = `<div class="empty-state">Could not load ranking data.<br><small>${e.message}</small></div>`;
  }
}

function toggleKw(idx, el) {
  const chart = window._rankChartRef;
  if (!chart) return;
  const meta = chart.getDatasetMeta(idx);
  meta.hidden = !meta.hidden;
  el.classList.toggle('off', meta.hidden);
  chart.update();
}

async function renderReports() {
  const el = document.getElementById('reports-content');
  let rankLog = [];
  try {
    const res = await fetch('ranking-log.json');
    rankLog = await res.json();
  } catch {}

  // Build a map of ranking snapshots by date
  const rankByDate = {};
  rankLog.filter(e => e.results.some(r => r.organicPosition !== undefined)).forEach(e => {
    rankByDate[e.date] = e;
  });
  const rankDates = Object.keys(rankByDate).sort();

  // Build change reports from history data (each unique change date)
  const changeDates = [...new Set(history.map(h => h.id))].sort();

  // For each change, find: rank before, rank 7d after, traffic (pending)
  const reportCards = changeDates.map(changeId => {
    const entry = history.find(h => h.id === changeId);
    if (!entry || entry.changes.length === 0) return null;

    // Rank snapshot closest BEFORE this change
    const before = rankDates.filter(d => d < changeId).slice(-1)[0];
    // Rank snapshot closest AFTER this change (7+ days later)
    const afterDate = new Date(new Date(changeId).getTime() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
    const after = rankDates.filter(d => d >= afterDate)[0];

    const beforeRanks = before ? rankByDate[before] : null;
    const afterRanks  = after  ? rankByDate[after]  : null;

    // P0 keywords only for compact view
    const p0 = ['live chat', 'AI chatbot', 'chatbot', 'chat', 'inbox', 'livechat', 'ai chat'];

    const rankRows = p0.map(kw => {
      const b = beforeRanks?.results.find(r => r.keyword === kw)?.organicPosition;
      const a = afterRanks?.results.find(r => r.keyword === kw)?.organicPosition;
      let deltaHtml = '';
      if (b && a) {
        const diff = b - a; // positive = improved
        if (diff > 0) deltaHtml = `<span class="delta up">↑${diff}</span>`;
        else if (diff < 0) deltaHtml = `<span class="delta down">↓${Math.abs(diff)}</span>`;
        else deltaHtml = `<span class="delta flat">—</span>`;
      } else if (!afterRanks) {
        deltaHtml = `<span class="pending-badge">⏳ pending</span>`;
      }
      return `<div class="report-row">
        <span class="label">${kw}</span>
        <span class="values">
          ${b ? `<span class="before">#${b}</span> →` : ''}
          ${a ? `<strong>#${a}</strong>` : (b ? `<strong>#${b}</strong>` : '<span class="before">—</span>')}
          ${deltaHtml}
        </span>
      </div>`;
    }).join('');

    // Traffic section (pending BigQuery)
    const trafficRows = ['Shopify organic', 'chatbot keyword', 'chat keyword', 'ai chatbot keyword'].map(label =>
      `<div class="report-row">
        <span class="label">${label}</span>
        <span class="values"><span class="pending-badge">⏳ BigQuery pending</span></span>
      </div>`
    ).join('');

    // Install section (pending BigQuery)
    const installRows = ['Traffic-to-install', 'Weekly installs'].map(label =>
      `<div class="report-row">
        <span class="label">${label}</span>
        <span class="values"><span class="pending-badge">⏳ BigQuery pending</span></span>
      </div>`
    ).join('');

    // Changed fields list
    const textChanges = entry.changes.filter(c => c.chars).slice(0, 5);
    const changesList = textChanges.map(c =>
      `<div class="change-item"><strong>${c.field}:</strong> ${c.content.substring(0, 80)}${c.content.length > 80 ? '...' : ''}</div>`
    ).join('');

    const rankStatus = afterRanks
      ? `<span style="font-size:11px;background:#dcfce7;color:#16a34a;padding:2px 8px;border-radius:4px">Rank data available</span>`
      : `<span class="pending-badge">⏳ Rank data in ${Math.max(0, 7 - Math.floor((Date.now() - new Date(changeId)) / 86400000))}d</span>`;

    return `
      <div class="report-card">
        <div class="report-card-header">
          <div>
            <div class="date">Change: ${entry.date} ${entry.proposed ? '· Proposed' : '· Applied'}</div>
            <div style="font-size:11px;opacity:.7;margin-top:2px">${entry.changes.length} fields updated</div>
          </div>
          <div class="fields-changed">${rankStatus}</div>
        </div>
        <div class="report-body">
          <div class="report-section">
            <div class="report-section-title">📈 Rank Impact <small style="font-weight:400;text-transform:none">(7d after)</small></div>
            ${rankRows}
          </div>
          <div class="report-section">
            <div class="report-section-title">👥 Traffic Impact <small style="font-weight:400;text-transform:none">(+7d)</small></div>
            ${trafficRows}
          </div>
          <div class="report-section">
            <div class="report-section-title">📦 Install Impact <small style="font-weight:400;text-transform:none">(+14d)</small></div>
            ${installRows}
          </div>
        </div>
        <div class="report-changes-list">
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#888;margin-bottom:6px">What changed</div>
          ${changesList}
        </div>
      </div>`;
  }).filter(Boolean).reverse(); // newest first

  el.innerHTML = reportCards.length
    ? `<div style="font-size:12px;color:#888;margin-bottom:16px">One report card per content change. Traffic + install columns fill in once BigQuery is connected.</div>` + reportCards.join('')
    : '<div class="empty-state">No change reports yet</div>';
}

          ${snap.tagline ? `
          <div class="comp-field">
            <div class="comp-field-label">Tagline</div>
            <div class="comp-field-value">${snap.tagline}</div>
          </div>` : ''}
          ${snap.features && snap.features.length > 0 ? `
          <div class="comp-field">
            <div class="comp-field-label">Features</div>
            <ul class="comp-features">
              ${snap.features.map(f => `<li>${f}</li>`).join('')}
            </ul>
          </div>` : ''}
          ${(snap.pricing && snap.pricing.length > 0) || snap.pricingNote ? `
          <div class="comp-field">
            <div class="comp-field-label">Pricing</div>
            <div class="comp-pricing-row">${formatPricing(snap)}</div>
          </div>` : ''}
          ${chCount > 0 ? `<div><span class="comp-changed-badge">⚡ ${chCount} change${chCount > 1 ? 's' : ''} detected</span></div>` : ''}
          <div class="comp-last-check">Last checked: ${lastCheck}</div>
        </div>
      </div>`;
  }).join('');

  // ── Change history table ──────────────────────────────────────────────────
  function renderChangeValue(val) {
    if (Array.isArray(val)) return val.map(v => typeof v === 'object' ? JSON.stringify(v) : v).join(', ');
    if (typeof val === 'object' && val !== null) return JSON.stringify(val);
    return String(val ?? '—');
  }

  const changeRows = recentChanges.map(item => {
    const compName = item.competitor || COMP_NAMES[item.handle] || item.handle;
    return item.changes.map(ch => `
      <tr>
        <td style="white-space:nowrap;color:#888">${item.date}</td>
        <td style="font-weight:700;white-space:nowrap">${compName}</td>
        <td style="font-weight:600;color:#1A0A7A">${ch.field}</td>
        <td>
          <div class="comp-diff-before">${renderChangeValue(ch.before).slice(0, 120)}</div>
          <div class="comp-diff-after">${renderChangeValue(ch.after).slice(0, 120)}</div>
        </td>
      </tr>`).join('');
  }).join('');

  // ── Side-by-side comparison table (taglines) ──────────────────────────────
  const chattyTagline  = 'Sell more: AI chatbot, livechat, inbox, help center & WhatsApp';
  const chattyFeatures = [
    'AI chatbot & live chat: 24/7 sales support with smart product recommendations',
    'Inbox & team: Manage WhatsApp, Instagram, Messenger & live chat in one place',
    'Help center & FAQ: Let shoppers self-serve and reduce support load instantly',
    'Sales automation: Trigger proactive chat to recover carts and boost conversions',
    'Mobile app: Reply to shoppers from your phone. Never miss a chat anywhere',
  ];

  const compareRows = Object.entries(snapshots).map(([handle, snap]) => {
    const name = snap.name || COMP_NAMES[handle] || handle;
    return `<tr>
      <td style="font-weight:700;white-space:nowrap">${name}</td>
      <td>${snap.tagline || '—'}</td>
      <td>${snap.features && snap.features[0] ? snap.features[0] : '—'}</td>
      <td style="text-align:center">${snap.rating ?? '—'} ★</td>
      <td style="text-align:center">${snap.reviewCount ? snap.reviewCount.toLocaleString() : '—'}</td>
    </tr>`;
  });

  // Insert Chatty as first row
  compareRows.unshift(`<tr class="chatty-row">
    <td>Chatty ✦</td>
    <td>${chattyTagline}</td>
    <td>${chattyFeatures[0]}</td>
    <td style="text-align:center">4.9 ★</td>
    <td style="text-align:center">251+</td>
  </tr>`);

  el.innerHTML = `
    <div class="rank-section-title">Competitor Listings</div>
    <div class="rank-updated">Last scraped: ${lastCheck} &nbsp;·&nbsp; ${Object.keys(snapshots).length} competitors tracked</div>
    <div class="comp-grid">${cards}</div>

    ${hasChanges ? `
    <div class="rank-section-title">Change History</div>
    <div class="rank-updated">Fields that changed since first snapshot — newest first</div>
    <div style="overflow-x:auto;margin-bottom:28px">
    <table class="comp-changes-table">
      <thead><tr>
        <th>Date</th><th>Competitor</th><th>Field</th><th>Change</th>
      </tr></thead>
      <tbody>${changeRows}</tbody>
    </table></div>` : `
    <div style="background:#f9f9fb;border:1px dashed #e0e0e0;border-radius:10px;padding:20px;margin-bottom:28px;font-size:13px;color:#aaa;text-align:center">
      No changes detected yet. History will appear here after the script runs a second time.
    </div>`}

    <div class="rank-section-title">Chatty vs Competitors — Tagline Comparison</div>
    <div style="overflow-x:auto">
    <table class="comp-compare-table">
      <thead><tr>
        <th style="min-width:100px">App</th>
        <th style="min-width:260px">Tagline / Subtitle</th>
        <th style="min-width:260px">Top Feature</th>
        <th>Rating</th>
        <th>Reviews</th>
      </tr></thead>
      <tbody>${compareRows.join('')}</tbody>
    </table></div>`;
}

function switchView(view) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('view-' + view).classList.add('active');
  if (view === 'current')     renderCurrent();
  if (view === 'rankings')    renderRankings();
  if (view === 'reports')     renderReports();
  if (view === 'competitors') renderCompetitors();
}

// Init
renderSidebar(currentDateId);
renderHistory(currentDateId);
</script>
</body>
</html>
