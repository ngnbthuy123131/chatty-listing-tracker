name: Chatty Daily Rank Check

on:
  schedule:
    # 8pm Bangkok = 13:00 UTC
    - cron: '0 13 * * *'
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  rank-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Run rank check
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: node rank-check-daily.cjs

      - name: Commit and push ranking-log.json
        run: |
          git config user.name "chatty-rank-bot"
          git config user.email "bot@chatty.app"
          git add ranking-log.json rank-state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Daily rank check — $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
